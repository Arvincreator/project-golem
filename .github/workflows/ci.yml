name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Refresh Lock File
        run: bash scripts/refresh-lock.sh

      - name: Install
        run: npm ci

      - name: Architecture Boundary Check
        run: npm run arch:check

      - name: Run Tests
        run: npm test -- --runInBand

      - name: Audit Production Dependencies
        run: npm audit --omit=dev --audit-level=high

  harness:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Run Harness Replay
        run: |
          mkdir -p artifacts/harness
          node scripts/harness/replay-agent-trace.js \
            tests/fixtures/harness/sample_trace.jsonl \
            strict \
            artifacts/harness/replay_report.json

      - name: Compare Baselines
        run: |
          node scripts/harness/compare-baseline.js \
            artifacts/harness/replay_report.json \
            tests/fixtures/harness/rolling_baseline.json \
            tests/fixtures/harness/fixed_baseline.json \
            artifacts/harness/baseline_compare.json

      - name: Apply Branch Gate
        run: node scripts/harness/ci-gate.js artifacts/harness/baseline_compare.json ${{ github.ref_name }}
